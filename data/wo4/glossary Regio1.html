        // Function to get unique starting letters from glossary
        function getActiveLetters() {
            const letters = new Set();
            glossaryData.forEach(item => {
                const firstLetter = item.term.charAt(0).toUpperCase();
                letters.add(firstLetter);
            });
            return letters;
        }

        // Disable unused alphabet buttons
        function updateAlphabetButtons() {
            const activeLetters = getActiveLetters();
            alphabetButtons.forEach(button => {
                const letter = button.dataset.letter;
                if (letter === 'ALL') return; // Always enable "ALL"
                button.disabled = !activeLetters.has(letter);
            });
        }

        // Initialize glossary
function renderGlossary(filterLetter = 'ALL') {
    sidebar.innerHTML = '';
    const filteredTerms = filterLetter === 'ALL' 
        ? glossaryData 
        : glossaryData.filter(item => 
            item.term.charAt(0).toUpperCase() === filterLetter
        );

    if (filteredTerms.length === 0) {
        sidebar.innerHTML = '<div class="term-item">No hay términos.</div>';
        return;
    }

    filteredTerms.forEach(item => {
        const termElement = document.createElement('div');
        termElement.className = 'term-item';
        termElement.innerHTML = `
            ${item.term}
            <span class="speaker-icon" data-term="${item.term}">🔊</span>
        `;
        termElement.addEventListener('click', () => {
            document.querySelectorAll('.term-item').forEach(el => el.classList.remove('active'));
            termElement.classList.add('active');
            showDefinition(item.term, item.definition);
        });
        sidebar.appendChild(termElement);
    });

    // Add click event for speaker icons
    document.querySelectorAll('.speaker-icon').forEach(icon => {
        icon.addEventListener('click', (e) => {
            e.stopPropagation(); // Prevent term selection when clicking the icon
            speakTerm(icon.dataset.term);
        });
    });
}

        // Show definition in the right panel
        function showDefinition(term, definition) {
            definitionPanel.innerHTML = `
                <div class="definition-title">${term}</div>
                <div class="definition-content">${definition}</div>
            `;
        }

        // Alphabet filter event listeners
        alphabetButtons.forEach(button => {

                if (button.disabled) return; // Skip disabled buttons
                alphabetButtons.forEach(btn => btn.classList.remove('active'));
                button.classList.add('active');
                renderGlossary(button.dataset.letter);
            });
        });

        // Initialize
        updateAlphabetButtons(); // Disable unused letters
        renderGlossary();

function speakTerm(term) {
    if ('speechSynthesis' in window) {
        const utterance = new SpeechSynthesisUtterance(term);
        utterance.lang = 'es-ES'; // Force Spanish pronunciation (change as needed)
        window.speechSynthesis.speak(utterance);
    } else {
        alert("Tu navegador no soporta texto a voz. Prueba con Chrome o Edge.");
    }
}

// ===== 1. CHECK FOR SPANISH TTS SUPPORT =====
let isSpanishVoiceAvailable = false;

function checkSpanishVoice() {
    return new Promise((resolve) => {
        if (!window.speechSynthesis) {
            resolve(false);
            return;
        }

        // Chrome loads voices asynchronously, so we need this workaround
        const voices = window.speechSynthesis.getVoices();
        if (voices.length > 0) {
            isSpanishVoiceAvailable = voices.some(voice => 
                voice.lang === 'es-ES' || voice.lang.startsWith('es-')
            );
            resolve(isSpanishVoiceAvailable);
        } else {
            // If voices aren't loaded yet, wait for the 'voiceschanged' event
            window.speechSynthesis.onvoiceschanged = () => {
                const voices = window.speechSynthesis.getVoices();
                isSpanishVoiceAvailable = voices.some(voice => 
                    voice.lang === 'es-ES' || voice.lang.startsWith('es-')
                );
                resolve(isSpanishVoiceAvailable);
            };
        }
    });
}

// ===== 2. MODIFY renderGlossary() TO SHOW/HIDE ICONS =====
async function renderGlossary(filterLetter = 'ALL') {
    sidebar.innerHTML = '';
    const filteredTerms = filterLetter === 'ALL' 
        ? glossaryData 
        : glossaryData.filter(item => 
            item.term.charAt(0).toUpperCase() === filterLetter
        );

    if (filteredTerms.length === 0) {
        sidebar.innerHTML = '<div class="term-item">No hay términos.</div>';
        return;
    }

    // Check voice support once (optimization)
    const showSpeakerIcon = await checkSpanishVoice();

    filteredTerms.forEach(item => {
        const termElement = document.createElement('div');
        termElement.className = 'term-item';
        termElement.innerHTML = `
            ${item.term}
            ${showSpeakerIcon ? `<span class="speaker-icon" data-term="${item.term}">🔊</span>` : ''}
        `;
        termElement.addEventListener('click', () => {
            document.querySelectorAll('.term-item').forEach(el => el.classList.remove('active'));
            termElement.classList.add('active');
            showDefinition(item.term, item.definition);
        });
        sidebar.appendChild(termElement);
    });

    // Add click event for speaker icons (if shown)
    if (showSpeakerIcon) {
        document.querySelectorAll('.speaker-icon').forEach(icon => {
            icon.addEventListener('click', (e) => {
                e.stopPropagation();
                speakTerm(icon.dataset.term);
            });
        });
    }
}

// ===== 3. TTS FUNCTION (UNCHANGED) =====
function speakTerm(term) {
    if ('speechSynthesis' in window && isSpanishVoiceAvailable) {
        const utterance = new SpeechSynthesisUtterance(term);
        utterance.lang = 'es-ES'; // Force Spanish
        window.speechSynthesis.speak(utterance);
    }
}
